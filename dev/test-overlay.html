<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>overlay test</title>
  <link rel="stylesheet" href="../css/overlay.css">
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: ui-monospace, monospace;
    }
    #bg {
      position: fixed;
      inset: 0;
      z-index: 0;
    }
    #controls {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 10000;
      display: flex;
      gap: 8px;
      align-items: center;
    }
    button {
      font-family: inherit;
      font-size: 14px;
      padding: 8px 14px;
      background: #111;
      color: #7BF7FF;
      border: 1px solid #22E5FF;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.4;
      cursor: default;
    }
    #status {
      color: #7BF7FF;
      font-size: 13px;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <canvas id="bg"></canvas>
  <div id="controls">
    <button id="next">show next question</button>
    <span id="status">idx: -</span>
  </div>
  <div id="ui"></div>

  <script type="module">
    import { QUESTIONS } from '../js/questions.js';
    import { QuestionOverlay } from '../js/overlay.js';

    const overlay = new QuestionOverlay(document.getElementById('ui'));
    const btn = document.getElementById('next');
    const status = document.getElementById('status');

    let i = 0;
    let running = false;

    btn.addEventListener('click', async () => {
      if (running) return;
      running = true;
      btn.disabled = true;
      const q = QUESTIONS[i];
      status.textContent = `idx: ${i} / tier: ${q.tier}`;
      await overlay.show(q, i);
      i = (i + 1) % QUESTIONS.length;
      btn.disabled = false;
      running = false;
    });

    // noisy animated background to test legibility over motion
    const canvas = document.getElementById('bg');
    const ctx = canvas.getContext('2d');
    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    function drawNoise() {
      const w = canvas.width, h = canvas.height;
      const imgData = ctx.createImageData(w, h);
      const buf = imgData.data;
      for (let p = 0; p < buf.length; p += 4) {
        const v = Math.random() * 255;
        buf[p] = v * 0.3;
        buf[p + 1] = v * 0.9;
        buf[p + 2] = v;
        buf[p + 3] = 255;
      }
      ctx.putImageData(imgData, 0, 0);
      requestAnimationFrame(drawNoise);
    }
    drawNoise();
  </script>
</body>
</html>
